<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaGuard Weather Map</title>
  <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
  <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #windy { width: 100%; height: 100%; }
    /* Hide Windy branding */
    #logo, .logo-wrapper, #mobile-ovr-select, #embed-zoom,
    .leaflet-control-attribution, .windy-logo,
    a[href*="windy.com"], .bottom-area, #bottom { display: none !important; }
  </style>
</head>
<body>
  <div id="windy"></div>
  <script>
    // Read params from URL: ?key=...&lat=...&lon=...&zoom=...&overlay=...
    const params = new URLSearchParams(window.location.search);
    const apiKey = params.get('key') || '';
    const lat = parseFloat(params.get('lat')) || 16.054;
    const lon = parseFloat(params.get('lon')) || 108.202;
    const zoom = parseInt(params.get('zoom')) || 7;
    const overlay = params.get('overlay') || 'rain';

    const options = {
      key: apiKey,
      lat: lat,
      lon: lon,
      zoom: zoom,
      overlay: overlay,
      verbose: false,
    };

    windyInit(options, (windyAPI) => {
      const { store, map, picker } = windyAPI;

      // Listen for overlay change messages from parent
      window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'changeOverlay') {
          store.set('overlay', event.data.overlay);
        }
        if (event.data && event.data.type === 'changePosition') {
          map.setView([event.data.lat, event.data.lon], event.data.zoom || zoom);
        }
      });

      // Notify parent that Windy is ready
      window.parent.postMessage({ type: 'windyReady' }, '*');
    });
  </script>
</body>
</html>
