# ============================================================
# AquaGuard — Docker Compose (Production / VPS, REFACTORED backend)
# Project: aquaguard-refactor-prod
# Usage: docker compose -f infrastructure/docker-compose.refactor.prod.yml up --build -d
#   or: make -f infrastructure/Makefile r-prod
# ============================================================

name: aquaguard-refactor-prod

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: aquaguard-refactor-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aquaguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aquaguard_pass}
      POSTGRES_DB: ${POSTGRES_DB:-aquaguard_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aquaguard} -d ${POSTGRES_DB:-aquaguard_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API Server (refactored) ──
  backend:
    build:
      context: ../backend-refactor
      dockerfile: Dockerfile
    container_name: aquaguard-refactor-backend
    env_file:
      - ../backend-refactor/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-aquaguard}:${POSTGRES_PASSWORD:-aquaguard_pass}@postgres:5432/${POSTGRES_DB:-aquaguard_db}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (Static Build + Nginx) ──
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_URL: ${VITE_WS_URL}
        VITE_GROQ_API_KEY: ${VITE_GROQ_API_KEY}
        VITE_OWM_API_KEY: ${VITE_OWM_API_KEY}
        VITE_WINDY_API_KEY: ${VITE_WINDY_API_KEY}
    container_name: aquaguard-refactor-frontend
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: aquaguard-refactor-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
