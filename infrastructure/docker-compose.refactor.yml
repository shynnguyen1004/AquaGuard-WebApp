# ============================================================
# AquaGuard — Docker Compose (Local Dev, REFACTORED backend)
# Project: aquaguard-refactor (isolated from legacy `aquaguard` project)
# Usage: docker compose -f infrastructure/docker-compose.refactor.yml up --build
#   or: make -f infrastructure/Makefile r-dev
# ============================================================

name: aquaguard-refactor

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: aquaguard-refactor-postgres
    environment:
      POSTGRES_USER: aquaguard
      POSTGRES_PASSWORD: aquaguard_pass
      POSTGRES_DB: aquaguard_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquaguard -d aquaguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API Server (refactored) ──
  backend:
    build:
      context: ../backend-refactor
      dockerfile: Dockerfile
    container_name: aquaguard-refactor-backend
    ports:
      - "5001:5001"
    env_file:
      - ../backend-refactor/.env
    environment:
      # Override DATABASE_URL to point to the in-network postgres service.
      DATABASE_URL: postgresql://aquaguard:aquaguard_pass@postgres:5432/aquaguard_db
      NODE_ENV: development
    volumes:
      # Bind mount for hot-reload via `node --watch`.
      - ../backend-refactor:/app
      # Keep the container's node_modules — never let the host overwrite it.
      - /app/node_modules
    command: ["node", "--watch", "server.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend Dev Server (unchanged — same Vite container) ──
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aquaguard-refactor-frontend
    ports:
      - "5173:5173"
    env_file:
      - ../frontend/.env
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/index.html:/app/index.html
      - ../frontend/vite.config.js:/app/vite.config.js
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
