# ============================================================
# AquaGuard — Docker Compose (Local Development)
# Usage: docker compose -f infrastructure/docker-compose.yml up --build
# ============================================================

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: aquaguard-postgres
    environment:
      POSTGRES_USER: aquaguard
      POSTGRES_PASSWORD: aquaguard_pass
      POSTGRES_DB: aquaguard_db
    ports:
      - "5433:5432"   # 5433 trên host để tránh xung đột với PG local
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Consolidated schema V2 — single init script creates all 10 tables
      - ./database/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquaguard -d aquaguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API Server ──
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aquaguard-backend
    ports:
      - "5001:5001"
    env_file:
      - ../backend/.env
    environment:
      # Override DATABASE_URL to point to Docker postgres service
      DATABASE_URL: postgresql://aquaguard:aquaguard_pass@postgres:5432/aquaguard_db
    volumes:
      # Bind mount for hot-reload (node --watch)
      - ../backend:/app
      # Prevent host node_modules from overriding container's
      - /app/node_modules
    command: ["node", "--watch", "index.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend Dev Server ──
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aquaguard-frontend
    ports:
      - "5173:5173"
    env_file:
      - ../frontend/.env
    volumes:
      # Bind mount for Vite hot-reload
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/index.html:/app/index.html
      - ../frontend/vite.config.js:/app/vite.config.js
      # Prevent host node_modules from overriding container's
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
